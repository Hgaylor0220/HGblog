id: other_solr_server
name: 'Solr search server'
description: 'A server used for testing.'
backend: search_api_solr
backend_config:
  site_hash: true
  retrieve_data: true
  highlight_data: true
  domain: generic
  server_prefix: 'server_prefix'
  index_single_documents_fallback_count: 0
  connector: searchstax_test
  connector_config:
    scheme: https
    host: solr.example.com
    port: 443
    path: /
    core: solr-test
    timeout: 5
    index_timeout: 5
    optimize_timeout: 10
    finalize_timeout: 30
    skip_schema_check: false
    solr_version: ''
    http_method: GET
    commit_within: 1000
    jmx: false
    jts: false
    solr_install_dir: ''
  optimize: false
  fallback_multiple: true
status: true
langcode: en
dependencies:
  module:
    - search_api_solr
