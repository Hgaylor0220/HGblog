id: searchstax_server_basic_auth_2
name: 'SearchStax server (Basic Auth 2)'
description: 'A server used for testing.'
status: true
langcode: en
backend: search_api_solr
backend_config:
  site_hash: true
  retrieve_data: true
  highlight_data: true
  domain: generic
  server_prefix: 'server_prefix'
  index_single_documents_fallback_count: 0
  connector: solr_cloud_basic_auth
  connector_config:
    scheme: https
    host: searchcloud-2-us-east-1.searchstax.com
    port: 443
    path: /
    core: drupal-5678
    timeout: 5
    index_timeout: 5
    optimize_timeout: 10
    finalize_timeout: 30
    skip_schema_check: false
    solr_version: ''
    http_method: GET
    commit_within: 1000
    jmx: false
    jts: false
    solr_install_dir: ''
    username: searchstax-test-2
    password: 'password456'
  optimize: false
  fallback_multiple: true
dependencies:
  module:
    - search_api_solr
third_party_settings:
  searchstax:
    autosuggest_endpoint: https://searchcloud-5-us-east-1.searchstax.com/solr/test-5678-suggester/emsuggest
